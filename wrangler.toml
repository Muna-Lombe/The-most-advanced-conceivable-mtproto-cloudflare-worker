name = "mtproto-cloudflare-worker"
main = "src/index.ts"
compatibility_date = "2024-05-12"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[env.production]
name = "mtproto-cloudflare-worker"

[env.staging]
name = "mtproto-cloudflare-worker-staging"

[[kv_namespaces]]
binding = "MTPROTO_CACHE"
id = "f967491363214d97967f6ad51344bef2"
preview_id = "your-preview-kv-namespace-id"

[[durable_objects.bindings]]
name = "SESSION_MANAGER"
class_name = "SessionManager"
script_name = "mtproto-cloudflare-worker"

[[migrations]]
tag = "v1"
new_classes = ["SessionManager"]

[vars]
#API_ID = "your-api-id"
#API_HASH = "your-api-hash"
#ENVIRONMENT = "development"

[[analytics_engine_datasets]]
binding = "ANALYTICS"